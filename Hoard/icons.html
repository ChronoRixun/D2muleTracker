<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<title>Hoard — App Icon Exploration</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;background:#f0eee9;font-family:-apple-system,system-ui,sans-serif}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
// Ember tokens (inline for this file)
const C = {
  void:'#030201', bg:'#070403', card:'#130906',
  text:'#f0d8b8', textDim:'#9a7a5c',
  gold:'#e8b048', goldDim:'#8a5018', goldHi:'#f5cf7a',
  ember:'#ff5020', emberHi:'#ff8038', emberDim:'#b03810',
  lava:'#c83018', cream:'#f5e8cc',
};
const FONT = {
  display:'"Cinzel", serif',
  mono:'"JetBrains Mono", monospace',
  hand:'"Cormorant Garamond", serif',
};

// ─── Icon variants ─────────────────────────────────────────────────
// Each is a 1024×1024 SVG. They scale down cleanly for preview at any size.

// 1. Monogram — stylized H
function IconMonogram({ light=false }) {
  const bg1 = light ? '#f5e8cc' : '#0a0403';
  const bg2 = light ? '#e8d4a8' : '#1c0d08';
  const stroke = light ? '#8a5018' : '#e8b048';
  const ember = '#ff5020';
  return (
    <svg viewBox="0 0 1024 1024" width="100%" height="100%">
      <defs>
        <radialGradient id="mg-bg" cx="50%" cy="45%" r="70%">
          <stop offset="0%" stopColor={bg2}/>
          <stop offset="100%" stopColor={bg1}/>
        </radialGradient>
        <radialGradient id="mg-ember" cx="50%" cy="52%" r="30%">
          <stop offset="0%" stopColor={ember} stopOpacity="0.55"/>
          <stop offset="100%" stopColor={ember} stopOpacity="0"/>
        </radialGradient>
        <linearGradient id="mg-h" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={light ? '#c58a28' : '#f5cf7a'}/>
          <stop offset="100%" stopColor={light ? '#8a5018' : '#c88a28'}/>
        </linearGradient>
      </defs>
      <rect width="1024" height="1024" fill="url(#mg-bg)"/>
      <rect width="1024" height="1024" fill="url(#mg-ember)"/>
      {/* Clean Cinzel-style H */}
      <g fill="url(#mg-h)">
        {/* left vertical — tapered roman stem */}
        <path d="M 238 194
                 L 238 174
                 L 438 174
                 L 438 194
                 L 402 208
                 L 402 820
                 L 438 834
                 L 438 854
                 L 238 854
                 L 238 834
                 L 274 820
                 L 274 208 Z"/>
        {/* right vertical */}
        <path d="M 586 194
                 L 586 174
                 L 786 174
                 L 786 194
                 L 750 208
                 L 750 820
                 L 786 834
                 L 786 854
                 L 586 854
                 L 586 834
                 L 622 820
                 L 622 208 Z"/>
        {/* crossbar — slight mid thickness, serif-weighted */}
        <path d="M 274 484 L 750 484 L 750 540 L 274 540 Z"/>
      </g>
      {/* ember at crossbar center */}
      <g>
        <circle cx="512" cy="512" r="36" fill={ember} opacity="0.35" style={{filter:'blur(14px)'}}/>
        <circle cx="512" cy="512" r="14" fill="#ffd080"/>
        <circle cx="512" cy="512" r="6" fill="#fff"/>
      </g>
    </svg>
  );
}

// 2. Diamond sigil — rotated square with ember core
function IconDiamond({ light=false }) {
  const bg1 = light ? '#f5e8cc' : '#0a0403';
  const bg2 = light ? '#d4a050' : '#1c0d08';
  const gold1 = light ? '#8a5018' : '#f5cf7a';
  const gold2 = light ? '#5a3010' : '#c88a28';
  return (
    <svg viewBox="0 0 1024 1024" width="100%" height="100%">
      <defs>
        <radialGradient id="d-bg" cx="50%" cy="55%" r="75%">
          <stop offset="0%" stopColor={bg2} stopOpacity={light?0.4:1}/>
          <stop offset="100%" stopColor={bg1}/>
        </radialGradient>
        <linearGradient id="d-gold" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={gold1}/>
          <stop offset="50%" stopColor={light?'#a0661a':'#e8b048'}/>
          <stop offset="100%" stopColor={gold2}/>
        </linearGradient>
        <radialGradient id="d-ember" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="#ffd080"/>
          <stop offset="30%" stopColor="#ff8038"/>
          <stop offset="70%" stopColor="#ff5020"/>
          <stop offset="100%" stopColor="#b03810" stopOpacity="0.3"/>
        </radialGradient>
        <filter id="d-glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="20"/>
        </filter>
      </defs>
      <rect width="1024" height="1024" fill="url(#d-bg)"/>
      {/* outer glow behind diamond */}
      {!light && <circle cx="512" cy="512" r="280" fill="#ff5020" opacity="0.25" filter="url(#d-glow)"/>}
      {/* outer diamond — forged gold */}
      <g transform="translate(512 512) rotate(45)">
        <rect x="-270" y="-270" width="540" height="540" fill="url(#d-gold)"/>
        {/* bevel — inner frame */}
        <rect x="-270" y="-270" width="540" height="540" fill="none" stroke={gold2} strokeWidth="6"/>
        <rect x="-240" y="-240" width="480" height="480" fill={light?'#f0eee9':'#0d0705'}/>
        {/* inner diamond — smaller */}
        <rect x="-170" y="-170" width="340" height="340" fill="url(#d-gold)"/>
        <rect x="-140" y="-140" width="280" height="280" fill={light?'#f5e8cc':'#070403'}/>
        {/* ember core */}
        <circle cx="0" cy="0" r="95" fill="url(#d-ember)"/>
        <circle cx="0" cy="0" r="40" fill="#ffe8b0"/>
        <circle cx="0" cy="0" r="16" fill="#fff"/>
      </g>
    </svg>
  );
}

// 3. Rune — carved stone with glowing grooves
function IconRune({ light=false }) {
  const bg1 = light ? '#d4c8b0' : '#0a0403';
  const bg2 = light ? '#a09080' : '#1c0d08';
  const stone = light ? '#2a1a10' : '#1a0b06';
  const stoneHi = light ? '#4a3020' : '#2a1408';
  const ember = '#ff5020';
  return (
    <svg viewBox="0 0 1024 1024" width="100%" height="100%">
      <defs>
        <radialGradient id="r-bg" cx="50%" cy="50%" r="70%">
          <stop offset="0%" stopColor={bg2}/>
          <stop offset="100%" stopColor={bg1}/>
        </radialGradient>
        <linearGradient id="r-stone" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={stoneHi}/>
          <stop offset="100%" stopColor={stone}/>
        </linearGradient>
        <radialGradient id="r-ember" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="#ffd080"/>
          <stop offset="50%" stopColor={ember}/>
          <stop offset="100%" stopColor={ember} stopOpacity="0"/>
        </radialGradient>
      </defs>
      <rect width="1024" height="1024" fill="url(#r-bg)"/>
      {/* rough stone tablet */}
      <g transform="translate(512 512)">
        <path d="M -320 -340 L 300 -360 L 340 320 L -300 360 Z"
              fill="url(#r-stone)"/>
        <path d="M -320 -340 L 300 -360 L 340 320 L -300 360 Z"
              fill="none" stroke={light?'#1a0b06':'#3d1e0c'} strokeWidth="8"/>
        {/* chips */}
        <path d="M -320 -340 L -280 -350 L -300 -310 Z" fill="#000" opacity="0.3"/>
        <path d="M 300 -360 L 320 -300 L 280 -320 Z" fill="#000" opacity="0.2"/>
      </g>
      {/* rune glyph — Zod-style */}
      <g stroke="url(#r-ember)" fill="none" strokeWidth="28" strokeLinecap="round" strokeLinejoin="round">
        {/* ember glow underlayer */}
        <g stroke="#ff5020" strokeWidth="60" opacity="0.4" filter="url(#r-blur)">
          <path d="M 380 330 L 640 330 L 380 700 L 640 700"/>
          <path d="M 510 330 L 510 700"/>
        </g>
      </g>
      <filter id="r-blur"><feGaussianBlur stdDeviation="18"/></filter>
      <g stroke="#ff8038" fill="none" strokeWidth="28" strokeLinecap="round" strokeLinejoin="round" filter="drop-shadow(0 0 12px #ff5020)">
        <path d="M 380 330 L 640 330 L 380 700 L 640 700"/>
        <path d="M 510 330 L 510 700"/>
      </g>
      {/* bright core */}
      <g stroke="#ffe8b0" fill="none" strokeWidth="10" strokeLinecap="round" strokeLinejoin="round">
        <path d="M 380 330 L 640 330 L 380 700 L 640 700"/>
        <path d="M 510 330 L 510 700"/>
      </g>
    </svg>
  );
}

// 4. Coin hoard — stack of gold coins from above
function IconCoins({ light=false }) {
  const bg1 = light ? '#f5e8cc' : '#0a0403';
  const bg2 = light ? '#e8c878' : '#1c0d08';
  const gold1 = '#f5cf7a';
  const gold2 = '#c88a28';
  const gold3 = '#8a5018';
  const ember = '#ff5020';
  return (
    <svg viewBox="0 0 1024 1024" width="100%" height="100%">
      <defs>
        <radialGradient id="c-bg" cx="50%" cy="100%" r="90%">
          <stop offset="0%" stopColor={light?'#ff8038':'#ff5020'} stopOpacity={light?0.2:0.6}/>
          <stop offset="50%" stopColor={bg2} stopOpacity={light?0.3:1}/>
          <stop offset="100%" stopColor={bg1}/>
        </radialGradient>
        <linearGradient id="c-coin" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={gold1}/>
          <stop offset="50%" stopColor="#e8b048"/>
          <stop offset="100%" stopColor={gold2}/>
        </linearGradient>
      </defs>
      <rect width="1024" height="1024" fill="url(#c-bg)"/>
      {/* underglow */}
      {!light && (
        <ellipse cx="512" cy="820" rx="360" ry="80" fill={ember} opacity="0.5" style={{filter:'blur(40px)'}}/>
      )}
      {/* coins — isometric stack */}
      <g>
        {/* bottom-most stack */}
        {[0,1,2,3,4,5].map(i => {
          const y = 780 - i*28;
          return (
            <g key={i}>
              <ellipse cx="420" cy={y+8} rx="155" ry="42" fill={gold3} opacity="0.7"/>
              <ellipse cx="420" cy={y} rx="155" ry="42" fill="url(#c-coin)"/>
              <ellipse cx="420" cy={y} rx="155" ry="42" fill="none" stroke={gold3} strokeWidth="3"/>
            </g>
          );
        })}
        {/* right stack — shorter */}
        {[0,1,2,3].map(i => {
          const y = 810 - i*28;
          return (
            <g key={`r${i}`}>
              <ellipse cx="680" cy={y+8} rx="135" ry="36" fill={gold3} opacity="0.7"/>
              <ellipse cx="680" cy={y} rx="135" ry="36" fill="url(#c-coin)"/>
              <ellipse cx="680" cy={y} rx="135" ry="36" fill="none" stroke={gold3} strokeWidth="3"/>
            </g>
          );
        })}
        {/* top coin — with sigil */}
        <g transform="translate(420 596)">
          <ellipse cx="0" cy="8" rx="155" ry="42" fill={gold3} opacity="0.7"/>
          <ellipse cx="0" cy="0" rx="155" ry="42" fill="url(#c-coin)"/>
          <ellipse cx="0" cy="0" rx="155" ry="42" fill="none" stroke={gold3} strokeWidth="3"/>
          {/* sigil on top coin */}
          <g transform="rotate(45) scale(0.9)">
            <rect x="-22" y="-22" width="44" height="44" fill={ember}/>
            <rect x="-22" y="-22" width="44" height="44" fill="none" stroke={gold3} strokeWidth="2"/>
          </g>
        </g>
        {/* scattered loose coins */}
        <ellipse cx="260" cy="840" rx="50" ry="14" fill={gold3} opacity="0.5"/>
        <ellipse cx="260" cy="835" rx="50" ry="14" fill="url(#c-coin)"/>
        <ellipse cx="850" cy="870" rx="45" ry="12" fill={gold3} opacity="0.5"/>
        <ellipse cx="850" cy="866" rx="45" ry="12" fill="url(#c-coin)"/>
      </g>
      {/* ember particle */}
      {!light && (
        <>
          <circle cx="512" cy="450" r="6" fill="#ffd080"/>
          <circle cx="580" cy="380" r="4" fill="#ff8038" opacity="0.8"/>
          <circle cx="440" cy="400" r="3" fill="#ff5020" opacity="0.7"/>
        </>
      )}
    </svg>
  );
}

// ─── Home screen mock ─────────────────────────────────────────────
function HomeScreen({ Icon, appName='Hoard' }) {
  // 4 other apps + Hoard in an iOS grid
  const others = [
    {name:'Messages', bg:'linear-gradient(180deg,#30d158,#1c9a3c)', glyph:'💬'},
    {name:'Calendar', bg:'#fff', glyph:''},
    {name:'Camera',   bg:'linear-gradient(180deg,#2c2c2e,#000)', glyph:''},
    {name:'Photos',   bg:'#fff', glyph:''},
    {name:'Maps',     bg:'linear-gradient(180deg,#a8dca8,#78b478)', glyph:''},
    {name:'Mail',     bg:'linear-gradient(180deg,#4a9eff,#1a6edd)', glyph:''},
    {name:'Notes',    bg:'linear-gradient(180deg,#fff8dc,#f0d870)', glyph:''},
  ];
  const wallpaper = 'linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)';
  const iconSize = 60;
  const row = (apps) => (
    <div style={{display:'flex',gap:16,justifyContent:'center'}}>
      {apps.map((a,i) => (
        <div key={i} style={{width:iconSize,textAlign:'center'}}>
          <div style={{
            width:iconSize,height:iconSize,borderRadius:14,
            background:a.bg,
            fontSize:28,display:'flex',alignItems:'center',justifyContent:'center',
            boxShadow:'0 1px 3px rgba(0,0,0,0.3)',
          }}>{a.glyph}</div>
          <div style={{fontSize:10,color:'#fff',marginTop:4,textShadow:'0 1px 2px rgba(0,0,0,0.6)'}}>{a.name}</div>
        </div>
      ))}
    </div>
  );
  return (
    <div style={{
      width:320,height:640,borderRadius:40,overflow:'hidden',
      background:wallpaper, position:'relative',
      boxShadow:'0 20px 40px rgba(0,0,0,0.3), 0 0 0 8px #1a1a1a, 0 0 0 10px #333',
    }}>
      {/* status bar */}
      <div style={{position:'absolute',top:8,left:0,right:0,display:'flex',
        justifyContent:'space-between',padding:'0 28px',color:'#fff',fontSize:11,fontWeight:600}}>
        <span>9:41</span><span>•••</span>
      </div>
      {/* dynamic island */}
      <div style={{position:'absolute',top:8,left:'50%',transform:'translateX(-50%)',
        width:90,height:24,borderRadius:12,background:'#000'}}/>
      {/* app grid */}
      <div style={{position:'absolute',top:60,left:0,right:0,display:'flex',flexDirection:'column',gap:16}}>
        {row(others.slice(0,4))}
        {row([...others.slice(4,6), {name:appName, custom:<Icon/>}, others[6]])}
      </div>
      {/* Hoard icon — hero position */}
      <style>{`
        .hoard-hero { position: absolute; top: 152px; left: 50%; transform: translateX(-50%);
          width: ${iconSize}px; height: ${iconSize}px; border-radius: 14px; overflow: hidden;
          box-shadow: 0 0 20px rgba(255,80,32,0.4), 0 4px 12px rgba(0,0,0,0.4); }
      `}</style>
      {/* dock */}
      <div style={{position:'absolute',bottom:24,left:16,right:16,height:72,borderRadius:24,
        background:'rgba(255,255,255,0.2)',backdropFilter:'blur(20px)',
        display:'flex',alignItems:'center',justifyContent:'space-around'}}>
        {[0,1,2,3].map(i => (
          <div key={i} style={{width:48,height:48,borderRadius:11,background:'#555'}}/>
        ))}
      </div>
      {/* home indicator */}
      <div style={{position:'absolute',bottom:6,left:'50%',transform:'translateX(-50%)',
        width:100,height:4,borderRadius:2,background:'rgba(255,255,255,0.5)'}}/>
    </div>
  );
}

// HomeScreen that actually embeds the Icon component at the right grid slot
function Home({ Icon }) {
  const apps = [
    {bg:'linear-gradient(180deg,#30d158,#1c9a3c)'},
    {bg:'#fff'},
    {bg:'linear-gradient(180deg,#2c2c2e,#000)'},
    {bg:'#fff'},
    {bg:'linear-gradient(180deg,#a8dca8,#78b478)'},
    {bg:'linear-gradient(180deg,#4a9eff,#1a6edd)'},
    {hoard:true},
    {bg:'linear-gradient(180deg,#fff8dc,#f0d870)'},
  ];
  const wallpaper = 'linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)';
  const iconSize = 56;
  return (
    <div style={{
      width:300,height:600,borderRadius:36,overflow:'hidden',
      background:wallpaper, position:'relative',
      boxShadow:'0 20px 40px rgba(0,0,0,0.3), 0 0 0 6px #1a1a1a, 0 0 0 8px #333',
    }}>
      <div style={{position:'absolute',top:10,left:0,right:0,display:'flex',
        justifyContent:'space-between',padding:'0 24px',color:'#fff',fontSize:10,fontWeight:600}}>
        <span>9:41</span><span>· · ·</span>
      </div>
      <div style={{position:'absolute',top:8,left:'50%',transform:'translateX(-50%)',
        width:80,height:22,borderRadius:11,background:'#000'}}/>
      <div style={{position:'absolute',top:44,left:16,right:16,display:'grid',
        gridTemplateColumns:`repeat(4, ${iconSize}px)`,gap:14,justifyContent:'space-between',rowGap:20}}>
        {apps.map((a,i) => (
          <div key={i} style={{width:iconSize,textAlign:'center'}}>
            <div style={{
              width:iconSize,height:iconSize,borderRadius:13,overflow:'hidden',
              background:a.bg,
              boxShadow: a.hoard ? '0 0 16px rgba(255,80,32,0.45), 0 2px 6px rgba(0,0,0,0.3)'
                                 : '0 1px 3px rgba(0,0,0,0.3)',
            }}>
              {a.hoard && <Icon/>}
            </div>
            <div style={{fontSize:9,color:'#fff',marginTop:3,textShadow:'0 1px 2px rgba(0,0,0,0.6)',height:10}}>
              {a.hoard ? 'Hoard' : ''}
            </div>
          </div>
        ))}
      </div>
      {/* dock */}
      <div style={{position:'absolute',bottom:20,left:12,right:12,height:68,borderRadius:22,
        background:'rgba(255,255,255,0.15)',backdropFilter:'blur(20px)',
        display:'flex',alignItems:'center',justifyContent:'space-around',padding:'0 14px'}}>
        {[0,1,2,3].map(i => (
          <div key={i} style={{width:44,height:44,borderRadius:10,background:'linear-gradient(180deg,#666,#333)'}}/>
        ))}
      </div>
      <div style={{position:'absolute',bottom:5,left:'50%',transform:'translateX(-50%)',
        width:96,height:4,borderRadius:2,background:'rgba(255,255,255,0.5)'}}/>
    </div>
  );
}

// ─── Icon frame — one card per direction ──────────────────────────
function IconSet({ label, Icon, flavor }) {
  return (
    <DCArtboard label={label} width={1120} height={760} style={{background:C.bg, padding:32, boxSizing:'border-box'}}>
      <div style={{display:'flex',flexDirection:'column',height:'100%',gap:20}}>
        {/* header */}
        <div>
          <div style={{fontFamily:FONT.mono,fontSize:10,letterSpacing:3,color:C.gold,textTransform:'uppercase'}}>
            {label.split('·')[0]}
          </div>
          <div style={{fontFamily:FONT.display,fontSize:26,color:C.text,letterSpacing:1,marginTop:4}}>
            {label.split('·')[1]}
          </div>
          <div style={{fontFamily:FONT.hand,fontSize:14,color:C.textDim,marginTop:6,fontStyle:'italic'}}>
            {flavor}
          </div>
        </div>
        {/* icon sizes row */}
        <div style={{display:'flex',gap:28,alignItems:'flex-end'}}>
          {/* App Store — 1024 */}
          <div>
            <div style={{width:180,height:180,borderRadius:40,overflow:'hidden',
              boxShadow:'0 8px 24px rgba(0,0,0,0.5)'}}>
              <Icon/>
            </div>
            <div style={{fontFamily:FONT.mono,fontSize:9,color:C.textDim,marginTop:6,textAlign:'center',letterSpacing:1}}>APP STORE · 1024</div>
          </div>
          {/* Home screen — 120 */}
          <div>
            <div style={{width:120,height:120,borderRadius:27,overflow:'hidden',
              boxShadow:'0 4px 12px rgba(0,0,0,0.5)'}}>
              <Icon/>
            </div>
            <div style={{fontFamily:FONT.mono,fontSize:9,color:C.textDim,marginTop:6,textAlign:'center',letterSpacing:1}}>HOME · 120</div>
          </div>
          {/* Settings — 60 */}
          <div>
            <div style={{width:60,height:60,borderRadius:13,overflow:'hidden',
              boxShadow:'0 2px 6px rgba(0,0,0,0.5)'}}>
              <Icon/>
            </div>
            <div style={{fontFamily:FONT.mono,fontSize:9,color:C.textDim,marginTop:6,textAlign:'center',letterSpacing:1}}>SETTINGS · 60</div>
          </div>
          {/* Notification — 40 */}
          <div>
            <div style={{width:40,height:40,borderRadius:9,overflow:'hidden',
              boxShadow:'0 1px 3px rgba(0,0,0,0.5)'}}>
              <Icon/>
            </div>
            <div style={{fontFamily:FONT.mono,fontSize:9,color:C.textDim,marginTop:6,textAlign:'center',letterSpacing:1}}>NOTIF · 40</div>
          </div>
          {/* Light tinted variant */}
          <div>
            <div style={{width:120,height:120,borderRadius:27,overflow:'hidden',
              boxShadow:'0 4px 12px rgba(0,0,0,0.3)'}}>
              <Icon light={true}/>
            </div>
            <div style={{fontFamily:FONT.mono,fontSize:9,color:C.gold,marginTop:6,textAlign:'center',letterSpacing:1}}>LIGHT TINT · 120</div>
          </div>
        </div>
        {/* home-screen in-context */}
        <div style={{display:'flex',gap:24,alignItems:'center',marginTop:8}}>
          <Home Icon={Icon}/>
          <div style={{flex:1,fontFamily:FONT.hand,fontSize:16,color:C.textDim,fontStyle:'italic',lineHeight:1.5}}>
            on the home screen, next to the gloss
          </div>
        </div>
      </div>
    </DCArtboard>
  );
}

// ─── Root ─────────────────────────────────────────────────────────
function App() {
