<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1600"/>
  <title>D2 Mule Tracker — Infernal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=IBM+Plex+Mono:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin:0; padding:0; background:#0a0605; -webkit-font-smoothing:antialiased; }
    @keyframes blink { 0%, 50% { opacity:1; } 51%, 100% { opacity:0; } }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="design-grimoire.jsx"></script>
  <script type="text/babel" src="design-ember.jsx"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const TWEAKS = /*EDITMODE-BEGIN*/{
      "grimoirePalette": "infernal",
      "emberPalette": "abyssal",
      "showGrimoire": false,
      "showEmber": true
    }/*EDITMODE-END*/;

    const GRIMOIRE_OPTS = [
      { value: 'infernal',  label: 'Infernal',  desc: 'scorched parchment · blood wax' },
      { value: 'brimstone', label: 'Brimstone', desc: 'ash-black · molten ember' },
    ];
    const EMBER_OPTS = [
      { value: 'abyssal',   label: 'Abyssal',   desc: 'deepest black · hellfire glow' },
      { value: 'hellforge', label: 'Hellforge', desc: 'forge-warm · molten gold' },
    ];

    function App() {
      const [tweaks, setTweaks] = React.useState(TWEAKS);
      const [editing, setEditing] = React.useState(false);

      React.useEffect(() => {
        const onMsg = (e) => {
          if (!e.data || typeof e.data !== 'object') return;
          if (e.data.type === '__activate_edit_mode') setEditing(true);
          if (e.data.type === '__deactivate_edit_mode') setEditing(false);
        };
        window.addEventListener('message', onMsg);
        window.parent.postMessage({type:'__edit_mode_available'}, '*');
        return () => window.removeEventListener('message', onMsg);
      }, []);

      const setKey = (k, v) => {
        setTweaks(prev => {
          const next = { ...prev, [k]: v };
          window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}}, '*');
          return next;
        });
      };

      return (
        <>
          <DesignCanvas style={{background:'#0a0605'}}>
            <div style={{padding:'0 60px 12px', maxWidth:1400}}>
              <div style={{fontSize:32, fontWeight:700, color:'#e8b048', letterSpacing:-0.6,
                fontFamily:'"Cinzel", serif', textShadow:'0 0 24px rgba(255,80,32,0.4)'}}>
                D2 MULE TRACKER · INFERNAL
              </div>
              <div style={{fontSize:15, color:'rgba(240,200,150,0.65)', marginTop:6, maxWidth:820, lineHeight:1.5,
                fontFamily:'Inter, system-ui, sans-serif'}}>
                Two darker directions, steeped in brimstone. Both respect D2's vocabulary (realms,
                mules, runewords, rarity colors) while avoiding any proprietary UI or branded art.
                Toggle Tweaks on (in the toolbar) to cycle palettes and hide/show directions.
              </div>
            </div>

            {tweaks.showGrimoire && (
              <DCSection
                title={"① Grimoire · " + (tweaks.grimoirePalette === 'infernal' ? 'Infernal' : 'Brimstone')}
                subtitle="Scorched parchment, blood-wax seal, serif italic. A demonologist's forbidden ledger."
              >
                <DCArtboard label="Mules · list" width={390} height={844}>
                  <GrimoireMules palette={tweaks.grimoirePalette}/>
                </DCArtboard>
                <DCArtboard label="Container · detail" width={390} height={844}>
                  <GrimoireContainer palette={tweaks.grimoirePalette}/>
                </DCArtboard>
                <DCArtboard label="Find item" width={390} height={844}>
                  <GrimoireFind palette={tweaks.grimoirePalette}/>
                </DCArtboard>
              </DCSection>
            )}

            {tweaks.showEmber && (
              <DCSection
                title={"② Ember · " + (tweaks.emberPalette === 'abyssal' ? 'Abyssal' : 'Hellforge')}
                subtitle="Obsidian black with hellfire glow, molten ember accents. Cinzel display + Inter body."
              >
                <DCArtboard label="Mules · list" width={390} height={844}>
                  <EmberMules palette={tweaks.emberPalette}/>
                </DCArtboard>
                <DCArtboard label="Container · detail" width={390} height={844}>
                  <EmberContainer palette={tweaks.emberPalette}/>
                </DCArtboard>
                <DCArtboard label="Find item" width={390} height={844}>
                  <EmberFind palette={tweaks.emberPalette}/>
                </DCArtboard>
              </DCSection>
            )}

            <div style={{padding:'0 60px', maxWidth:1200}}>
              <div style={{fontSize:22, fontWeight:600, color:'#e8b048', marginBottom:10,
                fontFamily:'"Cinzel", serif', letterSpacing:2}}>
                NOTES
              </div>
              <ul style={{fontSize:14, color:'rgba(240,200,150,0.75)', lineHeight:1.65, paddingLeft:20,
                fontFamily:'Inter, system-ui, sans-serif'}}>
                <li>Rarity colors (unique gold, set green, rune ember, gem blue) held across both so muscle memory stays.</li>
                <li>Both designs now push darker: deeper black grounds, scorched edges, hellfire glows, blood-wax red.</li>
                <li>Tap <b>Tweaks</b> in the toolbar above to switch between Infernal↔Brimstone and Abyssal↔Hellforge palettes, or hide a direction entirely.</li>
                <li>Next pass ideas: animated ember particles, lava-vein dividers, rune-etched tab bar, onboarding + Add Item modal.</li>
              </ul>
            </div>
          </DesignCanvas>

          {/* Tweaks panel */}
          {editing && (
            <div style={{
              position:'fixed', top:20, right:20, width:320, zIndex:9999,
              background:'rgba(14,8,6,0.96)', border:'1px solid #3d1e0c',
              boxShadow:'0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(255,80,32,0.1)',
              fontFamily:'"Cinzel", serif',
              backdropFilter:'blur(10px)',
            }}>
              <div style={{
                padding:'14px 16px', borderBottom:'1px solid #3d1e0c',
                display:'flex', alignItems:'center', justifyContent:'space-between',
                background:'linear-gradient(90deg, rgba(255,80,32,0.12), transparent)',
              }}>
                <div style={{color:'#e8b048', fontSize:14, fontWeight:700, letterSpacing:3, textShadow:'0 0 10px rgba(255,80,32,0.5)'}}>
                  TWEAKS
                </div>
                <div style={{color:'#9a7a5c', fontSize:10, letterSpacing:2, fontFamily:'"JetBrains Mono", monospace'}}>
                  INFERNAL v1
                </div>
              </div>

              {/* visibility */}
              <div style={{padding:'14px 16px', borderBottom:'1px solid #2a1408'}}>
                <TLabel>DIRECTIONS</TLabel>
                <div style={{display:'flex', gap:8, marginTop:8}}>
                  <TToggle active={tweaks.showGrimoire} onClick={()=>setKey('showGrimoire', !tweaks.showGrimoire)}>Grimoire</TToggle>
                  <TToggle active={tweaks.showEmber} onClick={()=>setKey('showEmber', !tweaks.showEmber)}>Ember</TToggle>
                </div>
              </div>

              {/* grimoire palette */}
              <div style={{padding:'14px 16px', borderBottom:'1px solid #2a1408', opacity: tweaks.showGrimoire ? 1 : 0.4}}>
                <TLabel>① GRIMOIRE PALETTE</TLabel>
                <div style={{display:'flex', flexDirection:'column', gap:6, marginTop:8}}>
                  {GRIMOIRE_OPTS.map(o => (
                    <TOption key={o.value} active={tweaks.grimoirePalette===o.value} onClick={()=>setKey('grimoirePalette', o.value)} label={o.label} desc={o.desc}/>
                  ))}
                </div>
              </div>

              {/* ember palette */}
              <div style={{padding:'14px 16px', opacity: tweaks.showEmber ? 1 : 0.4}}>
                <TLabel>② EMBER PALETTE</TLabel>
                <div style={{display:'flex', flexDirection:'column', gap:6, marginTop:8}}>
                  {EMBER_OPTS.map(o => (
                    <TOption key={o.value} active={tweaks.emberPalette===o.value} onClick={()=>setKey('emberPalette', o.value)} label={o.label} desc={o.desc}/>
                  ))}
                </div>
              </div>
            </div>
          )}
        </>
      );
    }

    function TLabel({children}) {
      return <div style={{color:'#9a7a5c', fontSize:10, letterSpacing:2.5, fontFamily:'"JetBrains Mono", monospace', fontWeight:600}}>{children}</div>;
    }
    function TToggle({active, onClick, children}) {
      return (
        <div onClick={onClick} style={{
          flex:1, padding:'8px 10px', textAlign:'center', cursor:'pointer',
          border:`1px solid ${active?'#ff5020':'#3d1e0c'}`,
          background: active?'linear-gradient(180deg, #ff5020, #c83018)':'transparent',
          color: active?'#1a0a04':'#e8b048',
          fontFamily:'"Cinzel", serif', fontWeight:600, fontSize:12, letterSpacing:2,
          boxShadow: active?'0 0 12px rgba(255,80,32,0.4)':'none',
        }}>{children}</div>
      );
    }
    function TOption({active, onClick, label, desc}) {
      return (
        <div onClick={onClick} style={{
          padding:'10px 12px', cursor:'pointer',
          border:`1px solid ${active?'#e8b048':'#2a1408'}`,
          background: active?'rgba(232,176,72,0.08)':'transparent',
          display:'flex', alignItems:'center', gap:10,
        }}>
          <div style={{
            width:12, height:12, borderRadius:'50%',
            border:`2px solid ${active?'#ff5020':'#5a4030'}`,
            background: active?'#ff5020':'transparent',
            boxShadow: active?'0 0 8px rgba(255,80,32,0.6)':'none',
            flexShrink:0,
          }}/>
          <div style={{flex:1, minWidth:0}}>
            <div style={{color: active?'#e8b048':'#f0d8b8', fontFamily:'"Cinzel", serif', fontSize:13, fontWeight:600, letterSpacing:1}}>
              {label}
            </div>
            <div style={{color:'#9a7a5c', fontSize:10, fontFamily:'Inter, system-ui, sans-serif', marginTop:1, fontStyle:'italic'}}>
              {desc}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
